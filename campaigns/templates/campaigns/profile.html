{% extends 'campaigns/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto px-6 py-10 mt-30 mb-40">

    <h1 class="text-3xl font-bold text-white mb-6">Profile</h1>

    <div class="bg-slate-800 rounded-2xl p-6 shadow-lg border border-slate-700">

        <div class="flex items-center gap-6">
            <img src="https://ui-avatars.com/api/?name={{ request.user.username }}&background=0d9488&color=fff&bold=true" class="w-20 h-20 rounded-full">

            <div>
                <h2 class="text-xl font-semibold text-white">
                    {{ request.user.username|title }}
                </h2>
                <p class="text-gray-400">{{ request.user.email }}</p>
            </div>
        </div>

    </div>

</div>
{% endblock %}

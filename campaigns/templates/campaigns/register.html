{% extends 'campaigns/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<section class="flex min-h-[70vh] items-center justify-center px-4 py-12">

<div class="w-full max-w-md">

<div class="bg-white rounded-3xl shadow-xl border border-gray-100 p-8">

<h2 class="text-3xl font-bold text-center mb-2">

Create your account

</h2>

<p class="text-center text-gray-500 text-sm mb-6">

Start supporting campaigns

</p>


<!-- Django messages -->

{% if messages %}

{% for message in messages %}

<div class="bg-red-100 text-red-700 p-3 rounded-lg mb-4 text-sm">

{{ message }}

</div>

{% endfor %}

{% endif %}


<form method="POST">

{% csrf_token %}

<div class="mb-4">

<label class="text-sm font-medium">

Username

</label>

<input 

type="text"

name="username"

required

class="w-full border rounded-xl py-3 px-4 mt-1"

placeholder="Username">

</div>


<div class="mb-4">

<label class="text-sm font-medium">

Email

</label>

<input 

type="email"

name="email"

required

class="w-full border rounded-xl py-3 px-4 mt-1"

placeholder="Email">

</div>


<div class="mb-4">

<label class="text-sm font-medium">

Password

</label>

<input 

type="password"

name="password"

required

class="w-full border rounded-xl py-3 px-4 mt-1"

placeholder="Password">

</div>


<div class="mb-5">

<label class="text-sm font-medium">

Confirm Password

</label>

<input 

type="password"

name="confirm_password"

required

class="w-full border rounded-xl py-3 px-4 mt-1"

placeholder="Confirm password">

</div>


<button 

type="submit"

class="w-full bg-teal-500 hover:bg-teal-600 text-white py-3 rounded-xl font-semibold">

Register

</button>


<p class="text-center text-sm mt-5">

Already have an account?

<a href="{% url 'login' %}"

class="text-teal-600 font-semibold">

Login

</a>

</p>

</form>

</div>

</div>

</section>

{% endblock %}

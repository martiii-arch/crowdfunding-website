{% extends 'campaigns/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg text-center border-t-4"
         style="border-color:#24324a;">

        <!-- Title -->
        <h2 class="text-2xl font-bold mb-4" style="color:#24324a;">
            Password Updated
        </h2>

        <!-- Message -->
        <p class="text-gray-600 mb-6">
            Your password has been successfully changed.
        </p>

        <!-- Button -->
        <a href="{% url 'home' %}"
           class="inline-block px-5 py-2 rounded-lg text-white font-semibold transition duration-200"
           style="background-color:#24324a;"
           onmouseover="this.style.backgroundColor='#1b263b'"
           onmouseout="this.style.backgroundColor='#24324a'">
            Go Home
        </a>

    </div>

</div>
{% endblock %}

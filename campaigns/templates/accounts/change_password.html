{% extends 'campaigns/base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 mt-1">

    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg border-t-4"
         style="border-color:#24324a;">

    
{% if form.errors %}
<div class="bg-red-100 text-red-600 p-3 rounded mb-4">
    {{ form.errors }}
</div>
{% endif %}

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center mb-6"
            style="color:#24324a;">
            Change Password
        </h2>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Old Password -->
            <div>
                <label class="block text-sm font-medium mb-1"
                       style="color:#24324a;">
                    Old Password
                </label>
                {{ form.old_password }}
            </div>

            <!-- New Password -->
            <div>
                <label class="block text-sm font-medium mb-1"
                       style="color:#24324a;">
                    New Password
                </label>
                {{ form.new_password1 }}
                <p class="text-xs text-gray-400 mt-1">
                    Must be 8+ characters, not common, not numeric only
                </p>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium mb-1"
                       style="color:#24324a;">
                    Confirm Password
                </label>
                {{ form.new_password2 }}
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full text-white py-2 rounded-lg font-semibold transition duration-200"
                style="background-color:#24324a;">
                Update Password
            </button>

        </form>

    </div>

</div>

<script>
    document.querySelectorAll("input").forEach(input => {
        input.classList.add(
            "w-full",
            "px-3",
            "py-2",
            "border",
            "rounded-lg",
            "focus:outline-none"
        );

        input.style.borderColor = "#24324a";

        input.addEventListener("focus", () => {
            input.style.boxShadow = "0 0 0 2px rgba(36, 50, 74, 0.3)";
        });

        input.addEventListener("blur", () => {
            input.style.boxShadow = "none";
        });
    });
</script>
{% endblock %}
